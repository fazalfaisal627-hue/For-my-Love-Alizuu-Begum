<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen Alizuu ❤️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            background: radial-gradient(circle, #2c001e 0%, #000000 100%);
            color: #ff85a2;
            font-family: 'Georgia', serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            text-align: center;
        }

        /* Flying Hearts */
        .heart {
            position: absolute;
            color: #ff1f5a;
            font-size: 20px;
            animation: floatUp 5s linear infinite;
            opacity: 0;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .container {
            z-index: 10;
            padding: 20px;
            max-width: 90%;
        }

        .photo-frame {
            width: 280px;
            height: 380px;
            border: 4px solid #ff85a2;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 133, 162, 0.5);
            margin: 0 auto 20px;
            background: #1a1a1a;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .romantic-text {
            font-size: 22px;
            line-height: 1.5;
            text-shadow: 2px 2px 10px rgba(255, 133, 162, 0.8);
            min-height: 120px;
            font-style: italic;
        }

        .nickname {
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 10px;
            display: block;
        }

        .hint {
            position: absolute;
            bottom: 30px;
            font-size: 12px;
            letter-spacing: 2px;
            color: #ff85a2;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body onclick="nextStep()">

    <!-- Hearts Container -->
    <div id="hearts-root"></div>

    <div class="container animate__animated animate__fadeIn">
        <div class="photo-frame">
            <img id="mainImg" src="https://i.ibb.co/3mP6D8g/image1.jpg" class="animate__animated animate__zoomIn">
        </div>
        
        <div id="content">
            <span class="nickname animate__animated animate__heartBeat" id="nickname">SWEETHEART... 💖</span>
            <div class="romantic-text" id="text">
                "Meri pyari Alizuu, ye website sirf tumhare liye hai. Tap karke mere dil ki baatein suno..."
            </div>
        </div>
    </div>

    <div class="hint">TAP ANYWHERE FOR MAGIC ✨</div>

    <script>
        // Hearts Animation
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.getElementById('hearts-root').appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 200);

        let step = 0;
        
        // Data with your pictures and deep lines
        const story = [
            {
                nickname: "JAANU... 🧸",
                text: "Pata hai Alizuu? Jab bhi main ye picture dekhta hoon, mujhe lagta hai duniya ki sabse haseen ladki sirf meri hai. Tum sirf meri Begum nahi, meri rooh ho.",
                img: "https://i.ibb.co/6ndf0pY/image3.jpg" // Face mask wali pic
            },
            {
                nickname: "MERI PYARI HASEEN BEGUM... 👑",
                text: "Tumhare ye mehndi bhare haath... inme mera naseeb likha hai. In haathon ko thaam kar main poori duniya se lad sakta hoon Baby Gurl. 💍",
                img: "https://i.ibb.co/6YfQ43K/image2.jpg" // Mehndi wali pic
            },
            {
                nickname: "BABYY GURLL... 🐣",
                text: "Ye dosti, ye sukoon, ye hugging moments... main chahta hoon ye waqt yahin ruk jaye. Tumhare bina ye pagal bilkul adhoora hai. 🥺",
                img: "https://i.ibb.co/3mP6D8g/image1.jpg" // Couple anime pic
            },
            {
                nickname: "MY EVERYTHING... ❤️",
                text: "Alizuu, main wada karta hoon, tumhari aankhon mein kabhi ansoo nahi aane dunga, aur agar aaye toh wo sirf khushi ke honge. I LOVE YOU FOREVER! ✨",
                img: "https://i.ibb.co/6ndf0pY/image3.jpg"
            }
        ];

        function nextStep() {
            if (step < story.length) {
                const textEl = document.getElementById('text');
                const nickEl = document.getElementById('nickname');
                const imgEl = document.getElementById('mainImg');

                // Animate change
                textEl.classList.remove('animate__fadeIn');
                imgEl.classList.remove('animate__zoomIn');
                
                setTimeout(() => {
                    nickEl.innerText = story[step].nickname;
                    textEl.innerText = story[step].text;
                    imgEl.src = story[step].img;
                    
                    textEl.classList.add('animate__fadeIn');
                    imgEl.classList.add('animate__zoomIn');
                    step++;
                }, 100);
            } else {
                document.getElementById('text').innerHTML = "Endless Love for Alizuu... ♾️❤️";
            }
        }
    </script>
</body>
</html>
