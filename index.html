<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen Alizuu ❤️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            background: radial-gradient(circle, #2c001e 0%, #000000 100%);
            color: #ff85a2;
            font-family: 'Georgia', serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            text-align: center;
        }

        .heart {
            position: absolute;
            color: #ff1f5a;
            font-size: 20px;
            animation: floatUp 5s linear infinite;
            opacity: 0;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .container {
            z-index: 10;
            padding: 20px;
            max-width: 90%;
        }

        .photo-frame {
            width: 280px;
            height: 380px;
            border: 4px solid #ff85a2;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 133, 162, 0.5);
            margin: 0 auto 20px;
            background: #1a1a1a;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .romantic-text {
            font-size: 22px;
            line-height: 1.5;
            text-shadow: 2px 2px 10px rgba(255, 133, 162, 0.8);
            min-height: 120px;
            font-style: italic;
        }

        .nickname {
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 10px;
            display: block;
        }

        .hint {
            position: absolute;
            bottom: 30px;
            font-size: 12px;
            letter-spacing: 2px;
            color: #ff85a2;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body onclick="nextStep()">

    <div id="hearts-root"></div>

    <div class="container">
        <div class="photo-frame">
            <!-- START IMAGE -->
            <img id="mainImg" src="anime.jpg">
        </div>
        
        <div id="content">
            <span class="nickname" id="nickname">SWEETHEART... 💖</span>
            <div class="romantic-text" id="text">
                "Meri pyari Alizuu, ye website sirf tumhare liye hai..."
            </div>
        </div>
    </div>

    <div class="hint">TAP ANYWHERE ✨</div>

<script>
let step = 0;

const story = [
    {
        nickname: "JAANU... 🧸",
        text: "Tum meri duniya ho ❤️",
        img: "mask.jpg"
    },
    {
        nickname: "BEGUM 👑",
        text: "Tumhare haath meri taqdeer hain 💍",
        img: "mehandi.jpg"
    },
    {
        nickname: "BABY GIRL 🐣",
        text: "Main tumhare bina adhoora hoon 🥺",
        img: "anime.jpg"
    }
];

function nextStep() {
    if (step < story.length) {
        document.getElementById('nickname').innerText = story[step].nickname;
        document.getElementById('text').innerText = story[step].text;
        document.getElementById('mainImg').src = story[step].img;
        step++;
    } else {
        document.getElementById('text').innerText = "❤️ Forever Love ❤️";
    }
}
</script>

</body>
</html>
