<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen Alizuu ❤️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background: radial-gradient(circle, #2c001e 0%, #000000 100%); color: #ff85a2; font-family: 'Georgia', serif; margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; text-align: center; }
        .heart { position: absolute; color: #ff1f5a; font-size: 20px; animation: floatUp 5s linear infinite; opacity: 0; z-index: 1; }
        @keyframes floatUp { 0% { transform: translateY(100vh) scale(0); opacity: 1; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
        .container { z-index: 10; padding: 20px; max-width: 90%; }
        .photo-frame { width: 280px; height: 380px; border: 4px solid #ff85a2; border-radius: 20px; overflow: hidden; box-shadow: 0 0 30px rgba(255, 133, 162, 0.5); margin: 0 auto 20px; background: #1a1a1a; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        .romantic-text { font-size: 22px; line-height: 1.5; text-shadow: 2px 2px 10px rgba(255, 133, 162, 0.8); min-height: 120px; font-style: italic; }
        .nickname { font-size: 28px; font-weight: bold; color: #ffffff; margin-bottom: 10px; display: block; }
    </style>
</head>
<body onclick="nextStep()">
    <div id="hearts-root"></div>
    <div class="container animate__animated animate__fadeIn">
        <div class="photo-frame">
            <img id="mainImg" src="1.webp" class="animate__animated animate__zoomIn">
        </div>
        <div id="content">
            <span class="nickname animate__animated animate__heartBeat" id="nickname">SWEETHEART... 💖</span>
            <div class="romantic-text" id="text">"Meri pyari Alizuu, ye website sirf tumhare liye hai. Tap karke mere dil ki baatein suno..."</div>
        </div>
    </div>
    <script>
        function createHeart() { const heart = document.createElement('div'); heart.classList.add('heart'); heart.innerHTML = '❤️'; heart.style.left = Math.random() * 100 + 'vw'; heart.style.animationDuration = (Math.random() * 3 + 2) + 's'; document.getElementById('hearts-root').appendChild(heart); setTimeout(() => heart.remove(), 5000); }
        setInterval(createHeart, 200);
        let step = 0;
        const story = [
            { nickname: "JAANU... 🧸", text: "Alizuu, tum meri zindagi ka wo haseen khwab ho jo haqeeqat ban gaya. I love you!", img: "3.jpg" },
            { nickname: "HASEEN BEGUM... 👑", text: "In mehndi wale hathon mein mera naam likha hai, aur meri kismat mein tum.", img: "2.jpg" },
            { nickname: "BABYY GURLL... 🐣", text: "Hamesha mere sath rehna, kyunki tumhare bina ye dil dhadakna bhool jata hai.", img: "1.webp" }
        ];
        function nextStep() { if (step < story.length) { const textEl = document.getElementById('text'); const nickEl = document.getElementById('nickname'); const imgEl = document.getElementById('mainImg'); setTimeout(() => { nickEl.innerText = story[step].nickname; textEl.innerText = story[step].text; imgEl.src = story[step].img; step++; }, 100); } }
    </script>
</body>
</html>
